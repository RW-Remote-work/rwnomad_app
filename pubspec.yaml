name: rwnomad_app
description: RWNomad - Digital Nomad Remote Job Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Routing
  go_router: ^14.8.1

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Local storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.4

  # i18n
  easy_localization: ^3.0.7

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  fluttertoast: ^8.2.8
  intl: any

  # Utilities
  logger: ^2.5.0
  flutter_html: ^3.0.0
  image_picker: ^1.2.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  freezed: ^2.5.8
  riverpod_generator: ^2.6.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/l10n/
    - assets/images/
    - assets/icons/
